front:
  text: 道德會元卷上
  hash: sha256:c4ee0d439f64a128847d8829ffd16f7f3da093d359150779f01fe6dbdae4b492
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0086_HFL_001-001a, image: hfl/0387/0387-110.png}
body:
  text: 都梁清庵瑩蟾子李道純元素述道道之可以道者非真常之道也夫真常之道始於無始名於無名擬議即乖開口即錯設若可道道是甚麼既不可道何以見道可道又不是不可道又不是如何即是若向這裏下得一轉語參學事畢其或未然須索向二六時中興居服食處回頭轉腦處校勘這令巍巍地活撥撥地不與諸緣作對底是箇甚麼校勘來校勘去校勘到校勘不得處忽然摸著鼻孔通身汗下方知道這箇元是自家有的自歷劫以來不曾變易所謂道也者不可須臾離也又道行住坐卧不離這箇況覆載之間頭頭物物都是這箇亘古亘今只是這箇生天生地只是這箇至於日用平常動靜作息只是這箇一切有形皆有敗壞性有這箇常在天地虛空亦有敗壞只有這箇不壞只這箇鐵眼銅睛覷不破為甚覷不破只傷他不曾覿面相逢縱饒覿面相逢也是蹉過且道蹉向甚麼處去不得亂走畢竟作麼會清庵向這裏分明舉似只是欠人承當倘遇知音剔起眉毛薦取咄昨夜江頭新雨過今朝依舊遠山青頌曰至道之極虛無空寂無象無形無名無質視之不見搏之不得聽之不聞覓無縱迹大無不包細無不入生育天地長養萬物運化無窮隱顯莫測不可知知不可識識太上老子舌頭無骨向此經中分明露出多言數窮不如一默這便是休更疑惑德德之一字亦是強名不可得而形容不可得而執持凡有施設積功纍行便是不德也只恁麼不修習不用功死灰稿木待德之自來終身無德也這箇德字愈求愈遠愈執愈失經云上德不德是以有德又云上德無為而無以為只這兩句多少分明只是欠人承當若是箇信得及的便把從前學解見知聲聞緣覺一切掀倒向平常履踐處把箇損字來受用損之又損損來損去損到損不得處自然玄德昭著方信無為之有益經云不言之教無為之益天下希及之又云玄德深矣遠矣會麼咦不離當處常湛然覓則知君不可見頌曰河沙妙德總在心則不可施為何勞修積愈探愈深愈執愈失放下頭頭掀翻物物後己先人守雌抱一純一不雜其德乃實修齊治平皆從此出妙用難量是謂玄德經經之一字亦是強名始者聖人為見世人隨情逐幻嗜欲迷真中心業識之擾攘靈地無明之熾盛是以天真喪失橫夭傷殘不能復其本元於是用方便力開善誘門接引羣迷使歸正道故著書設教強名曰經經者徑也衆所通行之大路也雖然讀是經者却不可泥在語言三昧上亦不可離了此經向外尋求須是向自己分上著意把這五千餘言細細咀嚼點點畫畫不要放過忽然嚼得一句半句透這一部經都在自己方信道開口不在舌頭上到這裏打開自己寶藏把出自己經來橫拈倒用不惟這一部經至於三十六部尊經一大藏教典從頭徹尾轉一遍只消一喝都竟還委悉麼平地起風波清天轟霹靂諦聽諦聽頌曰此一卷經妙用難評人人本具物物圓成堂堂驀直坦坦寬平歷劫不變亘古無更頭頭應用處處通津未曾舉起已自分明不是我家真的子誰人敢向裏頭行道可道非常道開口即錯名唤做甚麼可名非常名唤作一物即不中無名道也天地之始先乎覆載有名強名曰道萬物之母生生不息故常無欲以觀其妙無心運化常有欲以觀其徼徼音叫有意操持此兩者於不見中親見於親見中不見同出而異名一體一用同謂之玄體用一源玄之又玄形神俱妙衆妙之門百千法門皆從此出右一章虛無自然真常之道本無可道可道之道非真常之道元始祖氣化生諸天隨時應變之道也道本無名可名之名非真常之名天地運化長養萬物著於形迹之名也虛心無為則能見無名之妙有心運用則能見有名之徼妙即神也徼即形也知徼而不知妙則不精知妙而不知徼則不備徼妙兩全形神俱妙是謂玄之又玄三十六部尊經皆從此出是謂衆妙之門且道此經從甚麼處出咄頌曰崑崙山頂上元始黍珠中父母所生口終不為君通天下皆知美之為美斯惡矣惡烏路切美是惡之因皆知善之為善斯不善已善是不善之由故有無相生有生無無生有難易相成易以豉切難事易易事難長短相形長則短短則長高下相傾才有高便有下聲音相和有聲音便有和前後相隨前隨後後隨前是以聖人忘其美惡處無為之事忘其有無行不言之教忘其難易萬物作而不辭忘物生而不有忘形為而不恃忘情功成不居忘我夫惟不居忠其所自是以不去去上聲一切忘盡真一常存右二章美之與惡善與不善如影隨形自然相待至於有無難易互相倚伏有美便有惡有善便有不善是以聖人不辭不有不恃不居彼此兩忘有無不立是以常存而不去也此一章發眀首章體道之義使學者知同出異名之理離此用而即此用不墮於偏枯也頌曰人有美惡我無彼此一切掀翻衆泡歸水目前指出千般有我道其中一也無不尚賢絶聖棄智使民不爭忘我不貴難得之貨絶巧棄利使民不為盜忘物不見可欲轉物應機使心不亂忘情是以聖人虛其心全性實其腹全命弱其志全神強其骨全形常使民無知無欲空諸所有使夫知者不敢為夫音扶後同知音智識法者恐為無為寂然不動則無不治治音持感而遂通右三章不尚賢接上章處無為之事也謂不矜自己之賢能則民淳不貴奇貨則民富不見可欲則心定聖人治平天下必以修身為本虛心實腹一節皆修之要虛心而後志弱志弱而後無知無知故能忘我此不尚賢也實腹而後骨強骨強而後無欲無欲故能忘物此不貴難得之貨也二理相須足以了全性命矣頌曰實腹真常在虛心道自存不勞施寸刃談笑定乾坤道沖而用之太虛同體或不盈不自滿淵乎似萬物之宗不自見挫其鋭不露鋒鋩解其紛不隨世變和其光不自明同其塵不自是湛兮似若存常應常靜吾不知誰之子上無復祖象帝之先唯道為身右四章上云為無為故吹之以道沖而用之或不盈謂不自滿也不自滿者必受益挫鋭解紛虛中忘我之謂也吾不知誰之子象帝之先超虛無之外也頌曰不識誰之子焉知象帝先為君明説破太極未分前天地不仁無為以萬物為芻狗芻窗愈切愛養萬物不為主聖人不仁效天以百姓為芻狗萬民歸之而不為主天地之間虛中其猶橐籥乎虛用虛而不屈無心動而愈出應變無窮多言數窮數所各切説不得不如守中虛中而已右五章天覆地載化民育物可謂至仁言不仁者忘其所自也聖人愛民治國亦復如是修身養命亦復如是結上章道沖而用之之義也頌曰無底謂之橐三孔謂之籥中間一竅子無人摸得著摸得著為君吹出無聲樂谷神不死虛靈下昧是謂玄牝牝婢忍切一陰一陽玄牝之門一闔一闢是謂天地根生天生地綿綿若存無休無息用之不勤應用不窮右六章谷神不死虛靈不昧也接上章守中之義也虛靈不昧神變無方陰陽不測一闔一闢往來不息莫知其極動靜不忒不勞功力生生化化而無窮頌曰闔闢應乾坤斯為玄牝門自從無出入三界獨稱尊天地長久無休無息天地所以能長且久者無為以其不自生無心故能長久不遷不變是以聖人倣天後其身而身先忘我外其身而身存忘形非以其無私耶故能成其私以其無我故能成我右七章天不自天地不自地故生生不息聖人不自聖故與天地合德接上章用之不勤之義也頌曰道本至虛至虛無始透得此虛太虛同體太湖三萬六千頃月在波心説向誰上善若水以柔處卑水善利萬物而不爭隨方逐圓處衆人之所惡能容納穢惡故幾於道幾平聲合道居善地利物心善淵容物與善仁生物言善信應物政善治治平聲化物事善能成物動善時順物夫惟不爭故無尤物我如一右八章接上章後己先人所謂水者取柔和謙卑處下之義利物無爭故無尤頌曰無爭神寂靜自足氣和平放下這點子黃河幾度清持而盈之不如其已已音以天道虧盈而益謙揣而鋭之不可常保揣楚委切地道變盈而流謙金玉滿堂莫知能守鬼神害盈而福謙富貴而驕自遺其咎遺去聲咎上聲人道惡盈而好謙功成名遂身退收拾歸來天之道天地合德右九章持而盈之不如其已接上章上善若水之義功成名遂身退戒盈勸謙之義頌曰急走不離影回來墮塹坑只今當腳住陸地變平沉若解轉身些子力潛藏飛躍總由心載營𩲸不得亂走抱一能無離離平聲二物混成如母携嬰專氣致柔能嬰兒純一不雜反朴還淳滌除玄覽能無疵不見不聞塵淨鑑明愛民治國能無為治音持不動不搖道泰時清天門開闔能為雌出有入無不伐不矜明白四達能無知黜聰屛智和光同塵生之畜之畜凶入聲斡旋四德長養群情生而不有功成行滿隱迹潛形為而不恃忘其所自默默昏昏長而不宰長上聲退有餘地一任天更是謂玄德道隆德備脫體全真右十章載營𩲸猶車載物之喻𩲸好運動好馳騁好剛鋭故曰營𩲸𩲸屬陰陰盛則害陽情盛則役性能制伏者抱一無離致柔無疵無為為雌無知使陰魄不能肆其情至於魄伏陰消則神靈性寂也生之畜之生而不有忘其所自不用拘束自然不動如獲寶滿載而歸故曰載營魄自抱一以下純是載營魄之義接上章功成身退而續下章三十輻共一轂有車之用也頌曰事向無心得無心也太難悟來彈指頃迷後隔千山三十輻共一轂猶萬法同一心當其無數車無車有車之用輻來輳轂成車之用埏埴以為器埏扇平聲和士作器當其無數器無器有器之用水土假合成器之用鑿户牖以為室開户鑿牖當其無數室無宰有室之用户牖通達成室之用故有之以為利以有利無無之以為用以無用有右十一章以輻輳轂利車之用即總萬法歸心全神之妙也輻不輳轂何以名車法不歸心無以通神轂虛其中車所以運行心虛其中神所以通變故虛為實利實為虛用虛實相通去來無礙即上章載營魄之義也至於無物可載轂輻兩忘車復無也猶心法雙忘神歸虛也器與室並同此義頌曰鐵壁千重銀山萬座撥轉機輪驀直透過要知山下路但問去來人五色令人目盲眼被色眩五音令人耳聾耳被聲惑五味令人口爽口被味瞞馳騁田獵令人心發狂心為情使難得之貨令人行妨行去聲意為物轉是以聖人為腹不為目為去聲內境不出外境不入故去彼取此去羌吕切收視返聽右十二章上章發明虛用虛其用則不為聲色眩故次之以五色令人目盲色聲味物皆是根塵一切世人皆受盜惟有道者不受他瞞視聽言動非禮勿為則六賊化為六神通也故去彼取此頌曰見色神無定聞聲喪太和掀翻無一事赤手造彌羅寵辱若驚寵是辱先貴大患若身貴為患始何謂寵辱若驚諦聽下文寵為上辱為下寵得也故居上得之若驚無失失之若驚有得是謂寵辱若驚如是何謂貴大患若身設問吾所以大患者何哉為吾有身為去聲下同有身便有患及吾無身忘形無纍吾有何患忘貴無患故貴以身為天下外其身者貴其身者也若可寄天下以此為天下則可寄天下愛以身為天下後其身者愛其身者也若可托天下以此為天下則可托天下右十三章接上章為腹不為目忘我之義故次之以寵辱若驚寵辱貴患互相倚伏苟能思患而預防之則終身無患推此道而治平天下則天下永無危殆有國者憂天下如憂一身則天下樂推而不厭頌曰有辱何嘗辱居榮未必榮預防無過失猶更涉途程爭似全身都放下也無得失也無驚視之不見名曰夷大象無形聽之不聞名曰希大音希聲搏之不得名曰微道隱無名此三者不可致詰如何説得故混而為一殊途同歸在上不皎莫見乎隱在下不昧莫顯乎微繩繩不可名雖有條目實無名唤復歸於無物藏身處沒蹤迹是謂無狀之狀不見中親見無象之象象上聲親見中不見是謂忽恍渾渾淪淪迎之不見其首無始隨之不見其後後上聲無終執古之道無為以御今之有統攝萬有以知古始無為是謂道紀因無彰有右十四章希夷微道之極也混而為一返本也不皎不昧和其光也無象無狀藏其用也末後一句總證前三章而發下章之祕也頌曰這箇話靶難摸難畫八面玲瓏全無縫鏬恍忽窈冥中有象這些消息共誰論古之善為士者存其無象微妙玄通清淨光明深不可識倪之不見夫惟不可識故強為之容強上聲以有會無豫兮若冬涉川寒徹骨猶兮若畏四鄰愼獨儼兮若冰將釋無疑敦兮其若朴朴音朴如愚曠兮其若谷虛中渾兮其若濁渾平聲同塵孰能濁以動之徐清清者濁之源孰能安以久動之徐生靜者動之機保此道者不欲盈虛者實之本夫惟不盈沖虛故能弊不新成埋光鏟彩右十五章接上章道紀之義發明後學存誠致敬常愼其獨不住於相而抱一潛虛為日用至於頓息諸緣銷鎔萬幻撓之則不濁澄之則不清是謂微妙玄通深隱也頌曰微妙玄通隨人腳轉瞎却眼睛一物不見不如歸去來識取虛皇面致虛極守靜篤寂然不動萬物並作吾以觀其復觀復知化夫物藝藝各復歸其根動極復靜歸根曰靜返本是謂復命生意存焉復命曰常歷劫寂爾知常曰明古今洞然不知常昧了也妄作凶錯了也知常容大無不包容乃公細無不入公乃王物無不化王乃天理無不通天乃道曷有終窮道乃久無盡沒身不殆天地雖變這箇不變右十六章接上章善為士者致虛靜篤復命歸根純是神妙共向這裏具眼參學事畢其或未然更參末後頌曰致虛知妙本靜極見天心會得箇中意河沙總是金太上無上可上下知有之衆所共知其次親之譽之可親可譽便不自然其次畏之知其畏敬其次侮之全無忌憚信不足道難信有不信疑心重猶其貴言輕諾寡信功成名遂默而成之百姓皆為我自然不知所自右十七章太上謂無上可上雖下愚皆知有此理才可親近有美譽便不自然畏之者猶其次也侮之者失道遠矣天真喪失不能反本雖教之奚益言愈多而愈不信不若默而待之無為而化之使其自悟自然返朴不言而信也以治道言之太上以下不能無為親之譽之有言之教也畏之者刑禁也侮之者上失信也上失信於民則民不信猶其貴言不言之教也不言之教無為而成刑不試而民自服也至於功業成遂還淳返朴則親譽畏侮俱忘矣百姓安居樂俗忘其所自故曰謂我自然頌曰太上元無上常存日用間可憐無眼漢剛道出函關大道廢有仁義太朴既散仁義乃興智慧出有大偽出去聲智慧聰明根塵業識六親不和有孝子莫若常和國家昏亂有忠臣莫若常治右十八章接上章親譽畏侮之義與其國亂顯忠臣何若無為民自化頌曰聰明迷大本智慧喪天真無事常清靜逍遙快活人絶聖棄智無為民利百倍安靜絶仁棄義無心民復孝慈和順絶巧棄利無欲盜賊無有常足此三者以為文不足惟恐信不及故令有所屬令去聲屬音燭老婆心切見素抱朴無知無識少私寡欲忘物忘我右十九章發上章之藴聖智仁義巧利一切棄絶不復見用則民從其化而返朴也聖人惟恐後世學者擔負不起屬之以易簡曰見素抱朴少私寡欲易取於人也頌曰莫縱三心亂無令一念狂見聞知覺法無復可思量絶學無憂心頭無事唯之與阿相去幾何唯上聲不遠善之與惡相去何若大遠人之所畏不可不畏善惡可畏荒兮其未央哉俗人恐學力未至聖人恐損之未盡衆人熙熙如享太牢如登春臺嗜欲無厭我獨怕兮其未兆如嬰兒之未孩怕音泊憺然無欲乘乘兮若無所歸任運自然衆人皆有餘而我獨若遺貪務者常憂忘機者常樂我愚人之心也哉沌沌兮昏昏默默俗人昭昭我獨若昏俗人見藏於外聖人藏明於內俗人察察我獨悶悶悶音門俗人有分别聖人無彼此忽兮若晦晦上聲不識不知漂兮若無所止無物無執衆人皆有以我獨頑似鄙衆人皆有能聖人獨無能我獨異於人不與萬法為侶而貴食母貴在味道右二十章絶學者絶其所有也故次之絶聖人後俗人務學於事益其所聞惟恐進學不精故常憂聖人棄絶所有惟務於味道如求食於母守雌抱一而己故無憂也是謂絶學無憂頌曰才言絶學開口便錯廣識多知轉轉不覺人間萬事都忘却猶落他家第二機孔德之容無所不容惟道是從於法自在道之為物惟恍惟忽本然之天忽兮恍其中有象此天混然恍兮忽其中有物此天洞然窈兮冥其中有精此天常存其精甚真純一無偽其中有信活潑潑地自古及今其名不去去羌吕切歷劫常存以閲衆甫萬物資始吾何以知衆甫之然哉以此右二十一章上章云我獨異於人德之大也故次之以孔德之容言其廣納包容所謂道之為物果何物乎有象有物有精果有乎若謂有未具參學眼若謂無亦未具參學眼畢竟作麼會咄頌曰亘古一物了無人識剔起眉毛虛空露骨設若擬議躊躇照管當空霹靂曲則全不材者壽枉則直屈己者伸窪則盈窪烏瓜切謙則受益弊則新晦則自明少則得知止常足多則惑事繁則亂是以聖人抱一為天下式一能統衆不自見故明弊則新不自是故彰漥則盈不自伐故有功枉則直不自矜故長曲則全夫惟不爭守柔故天下莫能與之爭混而為一古之所謂曲則全者豈虛言哉是真實語誠全而歸之全其本然右二十二章曲全枉直窪盈弊新接上章孔德之義也不自見以下皆戒盈勸謙之義也謙下故無爭無爭則全其本然抱元守一復歸無極也故曰誠全而歸之頌曰莫管他人短休矜自己長短長無二見遍界不能藏希言自然開口不在舌頭上飄風不終朝狂則不久驟兩不終日躁則不長孰為此者是誰主宰天地衆所共知天地尚不能久天地尚爾而況人乎不可躁暴故從事於道者順理合轍道者同於道一體同觀德者同于德不生一見失者同於失無有分别同於道者道亦樂得之我同於道道亦同我同於德者德亦樂得之樂音烙上下並同心我同於德德亦同我同於失者失亦樂得之我同於失失亦同我信不足有不信我疑於物物亦疑我右二十三章希言自然接上章不爭之義謂不自見是不言而善應飄風驟雨言妄動躁進不久遠之喻從事於道者和順於道德混同於事物自然感通於物物亦自然相應也苟或言不合道妄有作為不能取信於人反為人輕忽也易繫云言行君子之樞機榮辱之主也可不愼乎頌曰道不異於人人自以為異一佛一切佛心是如來地跂者不立跂音伎躁進無功跨者不行欲速不達自見者不明不能晦德自是者不彰不能謙下自伐者無功不能克己自矜者不長不能含容其於道也曰餘食贅行贅朱芮切行去聲殘飯贅疣物或惡之惡烏路切衆所不美故有道者不處達者反是右二十四章此章總證前三章跂者不立跨者不行即飄風驟雨之謂也自見自是自矜自伐渾是私意私意確則害公何可久也故有道者不處餘食贅行不美也頌曰跂立元為妄跨行本是狂假饒成得事到底不如常有物混成此天混然先天而生此天洞然寂兮寥兮湛然常寂獨立而不改超然獨存周行而不殆運化無窮可以為天下母生育長養吾不知其名本無名唤字之曰道因物立名強為之名曰大強上聲無有限量大曰逝無有疆界逝曰遠無有邊際遠曰反收拾歸來故道大太虛無體天大法道地大法天王亦大法地域中有四大更有大麼王居其一焉三界獨稱尊人法地無不載地法天無不容天法道無不周道法自然右二十五章接上章有道不處於此發明處道之工夫也有物混成以下一節全首章體道之要四大以下純是神妙人只知域中有四大殊不知自己一物更人頌曰天地雖大亦有敗壞唯有這箇歷劫常在聖而不可知之者盡在如如不動中重為輕根輕生於重靜為躁君靜主於動是以君子終日行不離輜重不敢輕為雖有榮觀宴處超然常應常靜奈何萬乘之主而以身輕天下擔荷不起輕則失臣輕進失身躁則失君貪榮取辱右二十六章重者不可輕忽也輕則失臣躁則失君猶跂者不立跨者不行之謂亦飄風驟雨之喻不離輜重克負擔荷也宴處超然轉物也明上章法道之義總結二章體道之説而續下章善行之要也頌曰躁進那能久輕為了不成腳跟不點地猶更涉途程善行無轍迹轍直列切舉步不在腳跟善言無瑕謫開口不在舌端善計不用籌策一徹萬融善閉無關鍵而不可開全無縫罅善結無繩約而不可解解上聲全無繫纍是以聖人常善救人故無棄人修己安民常善救物故無棄物隨機利物是謂襲明明了相續故善人不善人之師教人為善不善人善人之資警人反善不貴其師無善可為不愛其資無過可改雖智大迷屛智如愚是謂要妙任運自然右二十七章盡前章之藴謹於言行則無迹無謫心之計其可算心之閉其可開心之結其可解道心堅固如此則無善不善之分師與資兩忘黜聰屛智終日如愚頌曰舉步不在腳善結非千手摸著鼻孔尖通身都是口若能於此善參詳七七元來四十九知其雄守其雌不自大為天下溪萬派歸源為天下溪常德不離打成一片復歸於嬰兒氣全知其白守其黑不自見為天下式萬法歸一為天下式常德不忒準的不差復歸於無極神全知其榮守其辱不自貴為天下谷萬有歸空為天下谷常德乃足復歸於朴朴音朴性全朴散則為器施之於物聖人用之以為官長設教化人故大制不割不言之教右二十八章守雌守黑守辱不見自己之明接上章雖智大遠之義嬰兒太極太朴天下之大本惟守雌抱一則能返本治國以此不假裁制民自淳而物自朴也頌曰白裏存乎黑雄中抱一雌綿綿功不間男解養嬰兒將欲取天下而為之者錯吾見其不得已已音以利禦寇不利為寇天下神器不可為也動著禍生為者敗之貪他底著他底執者失之討便宜落便宜凡物一切有相或行或隨或煦或吹或強或羸或載或隳有此便有彼切忌隨他去是以聖人去甚去上聲無為去奢無欲去泰無執右二十九章無為則無事有為便有事執者失為者敗有為之戒也強羸載隳互相倚伏如影隨形才有成便有敗是以聖人去貪甚去奢侈去驕泰深戒後世頌曰行隨煦吹強羸載隳中間主宰不知是誰著衣喫飯尋常事何須特地却生疑以道佐人主者無為不以兵強天下以慈衛之其事好還還音旋善惡皆報師之所處荆棘生焉心兵起處靈地荒蕪大軍之後必有凶年魔軍馳騁精氣耗散故善者果而已已音以有斷則生不敢以取強以柔待之果而勿矜去甚果而勿伐去奢果而勿驕去泰果而不得已顛沛必於是是果而勿強放倒剎竿物壯則老兵強則不勝是謂不道錯不道早已永失真道右三十章接上章去奢泰之義以道佐人主者不尚兵武善惡皆有報戒後世有國有家者守雌抱一勇於不敢至於不得已亦不敢取強故曰善者果而已頌曰莫縱三心亂常教志帥安忽然違野戰一箭定天山夫佳兵不祥之器大兵之後必有凶年物或惡之惡烏路切師之所處荆棘生焉故有道者不處處上聲心兵不起君豫居則貴左主柔用兵則貴右主剛兵者不祥之器武以討叛非君子之器君子常治不得已而用之恬淡為上以慈衛之勝而不美不得已而美之者要功也是樂殺人樂五教切肆其剛勇夫樂殺人者為之種禍不可得志於天下造物不容吉事尚左主生凶事尚右主殺偏將軍居左尚柔上將軍居右尚剛言以喪禮處之不祥之器殺人衆多不得已悲哀泣之一曰慈戰勝以喪禮處之如喪考妣右三十一章不以兵強天下故次之以兵者不祥之器聖人於此深戒萬世之下有國之君以無為清靜治化自然家國咸寧雖有甲兵無所陳之永無爭奪之患也頌曰默默清玄境澄澄養太和倒携三昧劍順化五陰魔道常無名虛無自然朴雖小至微天下不敢臣至尊侯王若能守抱一萬物將自賔無不服天地相合惟德是輔以降甘露和氣所致民莫之令而自均令去聲自然和平始制有名立法制度名亦既有示之好惡夫亦將知止使之知禁知止所以不殆知足故常樂譬道之在天下止於至善猶川谷之於江海止於卑下右三十二章上章云有道者不處此云道常無名朴雖小天下不敢臣發明有道者所處之要也有道之士外處卑下內抱一真萬物自然化天理自然合神變無窮頌曰會得無名朴方能縱復收便將大千界撮在一毫頭知人者智見於外自知者明見於內勝人者有力勇於敢自勝者強勇於不敢知足者富貧亦樂強行者有志始終不殆不失其所守者久志力愈堅命基愈固死而不亡者壽壽上聲真一常存右三十三章知人勝人明於外也自知自勝存於內也證前三章用武之戒也知足者貧亦樂力行者無不見固守者無危殆內明者出生死死而不亡者真一常存頌曰見物不見性知人不自知箇般無學輩猶道得便宜大道泛兮廣大悉備其可左右無限量萬物恃之以生而不辭所過者化功成不名有所存者神愛養萬物而不為主忘其所自常無欲寂然不動可名於小芥子納須彌萬物歸之而不為主任運自然可名於大須彌納芥子是以聖人終不為大芥子裏藏身故能成其大不可稱量右三十四章大道汜兮謂極廣大盡精微靡所不備也萬物恃之以生而不辭以下接上章不失其所守者久之義也以之治國則不失其所守以之修己則死而不亡故曰其可左右頌曰大道誠難測虛空不可量寥寥成一片何處是封疆執大象象上聲視之不見天下往萬民服往而不害萬物遂安平泰萬化安樂與餌樂音藥聲味俱美過客止客過則止道之出口淡乎其無味出去聲無聲無臭視之不足見大象無形聽之不足聞大音希聲用之不可既道隱無名用之無盡右三十五章上章末後句云故能成其大故次之以執大象天下往謂全其無象民物移心歸往也樂與餌聲味俱美喪其無象安能久乎道之出口無味無象無聲無色以其無體故應用無盡頌曰泥牛喘月木馬嘶風觀之似有覓又無蹤清庵拄杖子畫斷妙高峰將欲歙之必固張之固張必歙將欲弱之必固強之固強必弱將欲廢之必固興之固興必廢將欲奪之必固與之固與必奪是謂微明幾微先兆柔弱勝剛強柔弱常和用剛必敗魚不可脫於淵人安可離於道國之利器不可以示人有利則有害右三十六章執大象則能見事之幾微才見固張便知將歙未萌先兆未舉先知非天下之微明其孰能及此學道之士存其無象守其至柔與物無競則自然知幾苟用剛暴尚權謀智術求其勝物非道也哉比如魚本水中物求異羣魚欲脫於淵可乎既不可則人亦不可尚權尚權者反常也如魚離淵必死國之利器不可示人即孔子所謂可與立不可與權同一義聖人用權反常合道尚不可輕為而况常人乎可不戒哉頌曰眼若流星機如掣電瞻之在前忽然不見十方通塞中光明無不遍道常無為而無不為寂然不動感通天下之故侯王若能守萬物將自化上以風化下化而欲作吾將鎮之以無名之朴作做入聲我無欲而民自朴無名之朴亦將不欲我好靜而民自正不欲以靜使夫知者不敢為天下將自正為無為則無不治右三十七章真常之道本無為有為即非常道接上章微明之義天地無為萬物生成聖人無為萬民安泰以修煉言之都無作為於安靜之時存其無象毫髮之動便要先覺既覺便以無名朴鎮之朴本無形又曰無名謂空也道無為朴無名心無欲則自然復靜也靜之又靜天下將自正頌曰有作皆為幻無為又落空兩途俱不涉當處闡宗風道德會元卷上
