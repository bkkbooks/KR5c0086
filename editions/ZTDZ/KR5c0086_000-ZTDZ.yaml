body:
  text: 正辭予參諸家經本惟河上丈人本爲正河上丈人本亦有三樣有河上公解注有二家全解有章句白本其三本中惟河上丈人章句白本理長今從之遂將諸本差說表而出之以正辭理外有大同小異二百餘言不欲枚舉此略言大概以釋學者之疑第二章有無相生已下六句各加一之字者非也第三章是以聖人虛其心或云聖人治或云之治或云之治也非第十一章抱一能無離已下六句加一乎字非十三章寵爲上辱爲下或云寵爲下不合經義十六章豫兮若冬涉川或云與兮或以下六句三句無兮者非也十七章其次畏之其次侮之或云畏之侮之者非二十章忽兮若晦或云淡乎其若海非而貴食母或云兒貴求食於母非三十章或多三字或少一二字三十一章勝而不美或云故不美也非三十四章或以愛養爲衣被者非三十六章柔弱勝剛强分作二句非三十九章數車無車或云數轝譽者非四十九章德善德信下或加矣字者非五十二章既侍其母以知其子或云既知其母復知其子二句皆非五十五章益生不祥或云日生或云曰生皆非也六十六章差數句七十一章知不知上或云知不知尚矣非七十七章孰能以有餘奉天下其中加不足二字者非七十八章天下柔弱莫過於水或云莫柔弱於水非也八十章使有什伯之器而不用或云令器或云不用也皆非也究埋參究諸本解義與聖人義理不相合者表而出之其中異同訛謬頗多不欲盡舉學者致思焉故常無欲以觀其妙或以常無點作一句或云無欲者常存有欲者亡身若有欲者果亡身何必曰同謂之玄乎亡身爲玄可乎予謂無欲者無心作爲自然也有欲者有心運用工夫也無爲則能見無名之妙全其性也有爲則能見有名之徼全其命也有與無性與命同出而異名同謂之玄玄之又玄有無交入性命雙全也記云喜怒哀樂之未發謂之中中也者天下之大本也即無欲觀妙之義也發而皆中節謂之和和也者天下之達道也即有欲觀其徼之羲也致中和天地位萬物育即玄之又玄之義也所謂欲者欲人之不欲之謂不尚賢或云不求賢士者或云不用賢者皆非果不用賢則此經不足徴也决無是理玄牝之門或指口鼻爲玄牝之門者非也或云念頭起處者稍通亦不合經義載營魄或云䰟𩲸者或云陰陽者又有數說皆不通殊不知𩲸好運動載之者御之也三十輻或云一月三十日之數者或云火候者皆非也殊不知聖人本意不在三十上絶聖棄智或謂聖智不足道當棄之非也予謂聖人不以聖智見用於民絶學無憂或云絶學爲不學非也絶常人之學而學人之不學也絶學者絶世之學將欲歙之必固張之諸家解不通或云尚權者非也太上尚不尚賢安得尚權禮者亂之首或便謂禮不足道吾獨不然誠能自禮而進於仁義亦幾於道數車無車諸家解不通予謂數車之名件無一名車者喻我之一身無一名我者也生之徒十有三或云十分中有三分生者十分中有三分死者或云七情六欲者似是而非或云四關九竅更非也或以一月之盈虧比之火候猶非也解見正經本文下无狹其所居前人解不通又有反解者或云神无方者或廣大者皆非也或云無厭其所生無厭於道者正是妄說豈不聞結句云去彼取此予謂無狹其所居尚廣大貪婪也無厭其所生不畏大威貪生無厭也聖人自知不自見自愛不自貴不厚其生故云去彼取此有德司契無德司徹或謂徹者通也上古聖人一徹萬融無所不通民無德而稱焉此言只好隔壁聽與經義了無干涉予謂契者信約也叶韻作挈徹通徹也有德之人執其信約無德者司其明徹詳見正經本文下達者致思之此經文辭多叶韻朴叶扑闕音軋叶察察拔音跋叶脱字作音做入聲叶復似此之類極多各音本文下讀是經者切不可執泥字義道德會元序例
