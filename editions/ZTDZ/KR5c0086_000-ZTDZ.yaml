front:
  text: 道德會元序談三竊謂伏羲畫易剖露先天老子著書全彰道德此二者其諸經之祖乎今之學者未造其理何哉蓋由不得其傳耳予素不通書因廣參遍訪獲遇至人點開心易得造義經之妙於是罄其所得撰成三天易髓授諸門人惟老子道德經未能究竟一日有傳濟庵者携紫清眞人道德寳章示予觀其注脚頗合符節其中略有未盡處予欲饒舌熟思之未敢後有二三子各出數家解注請益於予先以正經參對多有異同或多一字或少一字或全句差殊或字訛舛互有得失往往不同予嘆曰正經尚爾況注解乎或問其故曰始者抄寫人差誤爾或開板有失點對或前人解不通處妄有增加以訛傳訛支離錯雜故也曰孰爲是曰河上公章句紫清道德寳章頗通曰何故曰與上下文理血脉貫通者爲正曰諸家解義如何曰所見不同各執一端耳曰請問其詳曰蓋由私意揣度非自己胸中流出故不能廣而推之也得之於治道者執於治道得之於丹道者執於丹道得之於兵機者執於兵機得之於禪機者執於襌機或言理而不言事者或言事而不言理者至於權變智謀旁蹊曲徑遂墮於偏枯皆失聖人之本意也殊不知聖人作經之意立極於天地之先運化於陰陽之表至於覆載之間一事一理無有不備安可執一端而言之哉予遂饒舌將彼解不通處及與聖人經義相反處逐一拈出舉似諸子衆皆曰然自後請益者屢至不容緘默遂將正經逐句下添箇注脚釋經之義以證頤神養氣之要又於各章下總言其理以明究本窮源之序又於各章後作頌以盡明心見性之機至於修齊治平紀綱法度百姓日用之間平常履踐之道洪纖巨細廣大精微靡所不備於中又作正辭究理二說冠之經首明正言辭究竟義理以破經中異同之惑目之曰道德會元俾諸後學密探熟味隨其所解而入庶不墮於偏枯會至道以歸元也惟是言辭鄙俚無非直解經義未敢自以爲是然較之諸本其庶幾焉與我同志其鑒諸時至元庚寅孟夏旦日都梁參學清庵瑩蟾子李道純元素序道德會元序例
