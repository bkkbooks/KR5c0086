  text: 道德會元卷下談四
  hash: sha256:bc7860e20d8f9ef34c29242a7427668d02b6cc4605ce9d4bde9d2c869b115552
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0086_SJB_002-120651a, image: sjb/12/120651a.png}
body:
  text: 都梁清庵瑩蟾子李道純元素述上德不德不尚己德是以有德其德愈大下德不失德執著己德是以無德其德愈失上德無爲而無以爲寂然不動感而遂通下德爲之而有以爲以德求感有所作爲上仁爲之而無以爲施仁及物本無作爲上義爲之而有以爲以義接物有所作爲上禮爲之而莫之應以禮齊物終不能齊攘臂而仍之攘如羊切力挽之愈不齊故失道而後德近道失德而後仁近德失仁而後義近仁失義而後禮近義夫禮者不淳忠信之薄不厚亂之首也不齊前識者道之華求奇不實愚之始也失道是以大丈夫處其厚不處其薄尚質實不求識居其實不居其華尚誠實不尚禮故去彼取此去羌吕切捨妄從眞右三十八章上章云道常無爲故次之以上德不德上德無爲故合道下德有爲不合道仁義猶近德可爲進道之階禮者純是作爲多不實以禮齊物物轉不齊蓋有爲終有失也執之不失亦可漸入佳境自仁義而反德自德而反道直造無爲也前識者智識也智識者失道之始故曰道之華有道者不處頌曰未得超三界如何出五常五常歸罔象獨步謁虚皇昔之得一者得一萬事畢天得一以清湛然常寂地得一以寧寂然不動神得一以靈混然成眞谷得一以盈綽然有餘萬物得一以生自然發育侯王得一以爲天下貞泰然安固其致之一也天無以清將恐裂星辰失度地無以寧將恐發山嶽崩頽神無以靈將恐歇陰陽失節谷無以盈將恐竭閉塞不通萬物無以生將恐滅和氣耗散侯王無以貞貴高將恐蹷家國危殆故貴以賤爲本一也高以下爲基一也侯王自謂孤寡不轂常抱其一此其以賤爲本也一爲萬象主非乎豈不然哉故致數車無車數音所數我無我不欲碌碌如玉落落如石貴賤兩忘右三十九章上章云去彼取此謂去其末而取其本也本者何一也一者天地之始萬物之母大道之用侯王若能守萬物自然歸往也自謂孤寡不轂自卑升高不忘本也不欲碌碌如玉落落如石貴賤兩忘惟抱一也數車之名件無一名車者數我之一身無一名我者轂輳合一則名車四大合一則名我也頌曰得一非爲妙還虚未是玄夢中知是夢天外莫尋天反者道之動神一出便收來弱者道之用專氣致柔天下萬物生於有有名萬物之母有生於無無名天地之始右四十章反者道之動接上章貴以賤爲本也萬物生於有有生於無即數車無車之說只這有無相生之理多少學人不知端的且道如何是有無端的意看頌曰有象非爲有無形未是無有無俱不立猶是墮偏枯無有有無中得趣方知鬍子没髭鬚上士聞道勤而行之上士一决一齊了中士聞道若存若亡中下多聞多不信下士聞道大笑之因何信不及只爲太分明不笑不足以爲道大迷之下必有大悟故建言有之纔聞兩片露出肝腸眀道若昧含華隱曜進道若退瞻前顧後夷道若類和光同塵上德若谷虛以受人大白若辱卑以自牧廣德若不足滿而不溢建德若偷偷音俞叶渝密而不露質眞若渝應變無方大方無隅不露圭角大器晚成不有其功大音希聲叩之即應大象無形莫見乎隱道隱無名莫顯乎微夫唯道善貸且成忠恕而已右四十一章上章云有無相生非高上之士不容無疑故次之以上士聞道夫道若昧若退若類若偷若渝不可得而見聞可笑之由惟高上之士禀性冲虚故能超然直入不言而信無爲而成之也中人以下未免半疑半信下愚不肖者不惟不信又且笑而侮之也善貸且成者貸下士笑侮之過而成上士勤行之功也雖下愚不肖一覺其初便可反善人之不善何棄之有頌曰至道元容易人心自謂難中人猶擬議下士轉顢頇莫顢頇星在秤兮物在盤道生一虚無生一氣一生二一氣判陰陽二生三陰陽成三才三生萬物三才生萬類萬物負陰而抱陽成象於天成形於地冲氣以爲和禀氣於中和人之所惡惟孤寡不轂一無隅衆人之所忌而王公以爲稱自謂孤寡故物一切有象或損之而益謙者受益或益之而損滿者必覆人之所教無非爲善亦我義教之我亦如是强梁者不得其死强大者死之徒吾將以爲教父不善人善人之資右四十二章一者萬物之母人之所惡謂一無偶孤寡不轂也王公大人不忘其本以是自稱卑下謙損也謙損者必受益强大者必招禍聖人設此戒人克己行謙見不善而内自省也頌曰好勝常逢敵行謙乆處安柔和爲日用處處王京山天下之至柔馳騁天下之至堅軟能蝕堅無有入無間貫金透石吾是以知無爲之有益謙損受益不言之教默而信之無爲之益無爲而成之天下希及之知音者鮮右四十三章上章孤寡不轂至謙也故次之以至柔謂柔弱勝剛强損中有益損之又損以至無爲不言而可信無爲之益世鮮及之頌曰觸來勿與競事過心清凉只這清凉境乾坤不覆藏名與身孰親名高辱身身與貨孰多財多害己得與失孰病得寵思辱是故甚愛必大費貪他底著他底多藏必厚亡討便宜落便宜知足不辱足止貪知止不殆畏止禍可以長乆知足常足右四十四章上章無爲之益謂有爲則有損也故次之以名與身孰親名貨得失皆有爲也終不長乆惟知足知止可以長乆頌曰世間一切有到底不長乆攝伏獼猴心聽取獅子吼若能運出家中寳啼鳥山花一樣春大成若缺其用不弊弊叶韻作鱉不自顯故無壞大盈若沖其用不窮不自滿故無盡大直若屈直而不肆大巧若拙爲而不恃大辨若訥光而不曜躁勝寒躁暴者焚靜勝熱安靜者凉清靜爲天下正人能常清靜天地悉皆歸右四十五章上章知足不辱故次之以大成若缺德有餘而爲不足者壽財有餘而爲不足者鄙大成若缺大盈若沖至於若屈若拙若訥皆德有餘而爲不足用之無盡也故爲天下正頌曰人情多聚散世道有興衰惟有眞常在古今無改移天下有道情逐性却走馬以糞意馬閑靈苗秀天下無道性逐情戎馬生於郊意馬狂心地荒罪莫大於可欲取辱之由禍莫大於不知足陷身之端咎莫大於欲得殺身之本故知足之足常足知足者貧亦樂右四十六章上章清靜爲天下正故次之以天下有道有道則清靜清靜則天下正天下正則罷兵事務農事故曰却走馬以糞無道則不清靜不清靜則天下不正則用威武征伐故曰戎馬生於郊曰罪曰禍曰咎皆欲心所致故結句云知足常足以修身言之清靜則欲心止欲心止則意大定故曰却走馬以糞不清靜欲心不止欲心不止則意馬狂故曰戎馬生於郊頌曰不見可欲使心不亂急走回來救得一半天下本無事人心自著忙不出户知天下反窮諸己不窺牖見天道回光返照其出彌遠其知彌少外事有限是以聖人不行而至不移一步到長安不見而名不見一物即如來不爲而成不動一毫成正覺右四十七章不出户知天下言有道之士知内不知外接上章之義知内不知外則無所不知見内不見外則無所不見若只知外見外而忘其内者知見淺狹矣頌曰朝遊南嶽暮宿蒼梧倏忽千里不曾離渠踏破鐵鞋無覓處得來全不費工夫爲學日益精進爲道日損减損損之又損一切損盡以至無爲無損可損無爲而無不爲無不克取天下常以無事事向無心得及其有事有心便不得不足以取天下有爲終有盡右四十八章不出户知天下内知也其出彌遠外事也故次之爲學日益言無學者求其增益爲道者事事减損易云山下有澤損君子以懲忿窒慾正謂此也至于無忿可懲無慾可損以至無爲則萬民化而天下歸往也苟或妄有作爲則民亂而難治故曰不足以取天下頌曰有學頭頭昧無爲事事差學爲俱絶斷損益任從他莫笑我儂窮相態從來賊不打貧家聖人無常心任用無方以百姓心爲心隨機應感善者吾善之從而爲善不善者吾亦善之使之反善德善全其至善信者吾信之從而爲信不信者吾亦信之使之反信德信全其至信聖人在天下惵惵惵音牒兢兢業業爲天下渾其心渾平聲殊途同歸百姓皆注其耳目容止可觀作事可法聖人皆孩之天下一家右四十九章上章云無事取天下故次之以聖人無常心所謂無常心者隨機應感不逆民物之情故百姓遵聖人之言行聖人之行從聖人之化天下同一心也頌曰信者從他信善者從他善若能如是知却成顛倒見顛倒見三界十方成一片出生入死忿慾生死之門生之徒絶忿慾十有三水火濟死之徒縱忿慾十有三水火不濟人之生皆賴水火動之死地水火相違亦十有三水成數六火成數七夫何故忿慾使然以其生生之厚忿慾不止貪生無厭蓋聞善攝生者無忿慾陸行不遇虎兕兕序姊切内省不疚何憂何懼入軍不被甲兵心無罣礙故無恐怖兕無所投其角虎無所措其爪兵無所容其刃不厚其生焉能有死夫何故身非我有死奈我何以其無死地忘其生死右五十章柔弱生之徒强大死之徒柔弱者則能懲忿慾强大者爲忿慾所使能懲忿則火降窒慾則水升水火既濟則生故曰生之徒起忿則無明火熾縱慾則若海波翻水火相違則死故曰死之徒强大者貪生無厭柔弱者視死如歸既不以死爲死虎兕甲兵於我何害以丹道言之水火既濟聖胎凝矣頌曰涅槃心易曉差別智難明既無差别智安有死和生道生之元始祖氣德畜之畜凶入聲化生諸天物形之在天成象勢成之在地成形是以萬物一切有象莫不尊道而貴德皆從道生道之尊德之貴越古超今夫莫知爵而常自然不言善應故道生之畜之神全長之育之氣全成之熟之精全養之覆之形全生而不有忘機爲而不恃忘情長而不宰忘物是謂玄德合道右五十一章善攝生者以其無死地故次之以道生之言道本無形因生育天地而形可見道本無名因長養萬物而名可立一切有相受命于天成形於地禀氣於中和皆道之廕也故萬物莫不尊道而貴德頌曰可道非常道無爲却有爲爲君明說破衆水總朝西夜來混沌攧落地萬象森羅總不知天下有始無名天地之始以爲天下母有名萬物之母既知其母知本以知其子便知末旣知其子知未復歸其母及本没身不殆常在塞其兊内境不出閉其門外境不入終身不勤不勞而治開其兊内境出濟其事外境入終身不救永失眞道見小曰明知幾知微守柔曰强軟能蝕堅用其光物來斯照復歸其明放去收來無遺身殃遺音謂切忌隨他去是謂襲常直下承當右五十二章道生之言道之始也故次之天下有始末後一句最極切修眞至士當向這裏眞眼莫教蹉過頌曰不收不放無上可上清淨自然本來模樣更問第一義如何向道有言皆是謗使我介然有所知未舉先覺行於大道無爲惟施是畏識法者恐大道甚夷坦平驀直而民好徑好去聲行險以僥倖朝甚除朝音潮事繁即亂田甚蕪靈地荒蕪倉甚虚靈地空竭服文彩貪帶利劍嗔厭飲食痴財貨有餘欲心不止是謂盜夸三毒擾攘非道也哉錯右五十三章上章云襲常謂密用常道也故次之以使我介然有所知有所知則能直下承當而密用若無所知則不能密用妄有作爲内爲根塵所蔽外被業識所眩兼無明三毒爲撓非道也哉頌曰弄巧成拙多煩早老金玉滿堂焉能常保若於日用顛倒行大地塵沙盡成寳善建者不拔拔音跋根深善抱者不脱蔕固子孫祭祀不輟綿遠修之於身身修其德乃眞全眞脩之於家家齊其德有餘寬裕修之於鄉鄉修其德乃長乆遠修之於國國治其德乃豐淳厚修之於天下天下平其德乃普道泰故以身觀身内有一塵其德不眞以家觀家有一不順其德無餘以鄉觀鄉有一不化其德不長以國觀國有一不善其德不豐以天下觀天下有一小人其德不普吾何以知天下之然哉以此反求諸己右五十四章上章云使我介然有所知有所知則道心堅固不失其守故次之以善建者不拔也以之修身觀心察性心定則身之修也以之治國觀民察己民化則國之治也天下有一不善則是自己政化不善也書云百姓有過在于一人此之謂也反觀諸己心有一塵染著則是我之性天未明也頌曰觀國非容易觀身意更深海枯終見底人死不知心含德之厚退藏於密比於赤子純一不雜毒蟲不螫猛獸不攫玃鳥不搏螫音釋攫玃並厥縛切我忘於物物亦忘我骨弱筋柔而握固筋音斤神全未知牝牡之合而䘒作䘒最平聲精全精之至也自然終日號而不嗄號平聲氣全和之至也柔和知和曰常此天混然知常曰明此天洞然益生不祥益則有損心使氣曰强氣動則剛物壯則老剛則易折是謂不道錯不道早已喪失天眞右五十五章善建者不拔德之厚也故次之以含德之厚比於赤子者不失赤子之心也赤子之心純一不雜無害於物物亦不能害不知有男女之別其䘒亦作精氣所至也雖作而無心故能全其至精終日號啼其聲不變冲和所致也修身以此則能全其本然是謂含德之厚苟失其赤子之心䘒作而心動天眞喪也赤子之心既發便不自然發而不遠而知覺亦可反常故曰明苟不知覺而縱其所欲日增日盛精氣耗散故曰不祥血氣既盛又縱心而使之愈盛也氣血盛則形衰矣是謂不道不道則早已也頌曰欲識混元面先存赤子心此心常不昧法體證黄金知者不言默而成之言者不知口頭三昧塞其兊无言閉其門无見挫其銳无爭解其紛无事和其光无我同其塵无人是謂玄同一以貫之故不可得而親忘情不可得而䟽忘形不可得而利忘物不可得而害忘機不可得而貴忘有不可得而賤忘无故爲天下貴一切忘盡眞常獨存右五十六章含德之厚則能緘默故次之以知者不言非不言也無可得而說也尹眞人云非道不可言不可言即道正謂此也予謂多言獲利不若默而無害也噫頌曰絶利終無害無親便不䟽多言應有失爭似觜盧都以正治國不偏不倚以奇用兵無計無謀以無事取天下無爲無執吾何以知其然哉以此性徹理融天下多忌諱而民彌貧利欲所惑民多利器國家滋昏奇貸所眩人多伎巧奇物滋起末伎所遷法令滋彰盜賊多有法出奸上故聖人云我無爲而民自化不尚權謀我好靜而民自正不用利器我無事而民自富不貴我無欲而民自朴蒲朴卜切以正治國右五十七章上章云知者不言得其正也故次之以正治國也多忌諱多利器多伎巧多法令皆不正也上無忌諱則民裕絶權謀則民化薄税歛則民富道之以德則民樸無爲無事無欲好靜皆正也以此治國則海晏河清以此行道道泰時亨以此修身氣固神凝一人正萬民皆正一心正萬化皆正一身正萬事皆正正之義大矣哉頌曰著意頭頭錯無爲又落空自從心路絶無日不春風其政悶悶悶音門无爲寬裕其民淳淳質朴有餘其政察察有爲嚴謹其民缺缺缺音軋貪婪无足禍兮福所倚畏禍則福必至福兮禍所伏忽福則禍必至孰知其極禍福無門惟人自召其無正耶惟正可守正復爲奇恃正則爲奇善復爲妖矜善則爲妖民之迷與道相反其固日乆迷遠不復是以聖人方而不割方正其身使心自化廉而不穢清廉其德使民自化直而不肆梗直其行使物自化光而不曜含畜其光天下化成右五十八章上章無爲無事使民自化寬大之治也故次之以其政悶悶是謂上寬裕則民淳實上多事則民昏暴悶悶寬也察察謹也寬則得衆盡法無民禍福相倚正奇相待善妖相反理之然也可不戒諸修福不如遠禍用正不若閑邪正雖爲善苟自矜爲奇德則反爲妖正之爲正斯不正己善之爲善斯不善已是以聖人方正其身刑罰清而萬民服清廉其德不惡而嚴梗直其行和而不流清明在躬慮其太察自昭明德故結句云光而不曜學者洞此長生乆視之道得矣頌曰倚善功難遂矜奇事轉迷世間無限事伶利不如痴治人事天存心養性莫若嗇嗇音色凡事從儉夫惟嗇夫謂早服妙在機先早服謂之重積德含德之厚重積德則無不克无所不至無不克則莫知其極廣大悉備莫知其極可以有國天埋在我有國之母可以長乆生生不窮是謂深根固蒂性海彌深命基永固長生乆視之道曷有終窮右五十九章接上章其政悶悶之義治人事天莫若從儉以國言之省刑罰薄税歛以身言之省言語節飮食以心言之省思慮絶視聽盡其心養其性可以事天也頌曰生事事生省事事省不省不生斷踪絶影雲在嶺頭閑不徹水流澗下太忙生治大國若烹小鮮撓之則糜以道莅天下莅音利清靜无爲其鬼不神陰魔俛首非其鬼不神其神不傷人邪不干正非其神不傷人聖人亦不傷人大制不割夫兩不相傷形神俱妙故德交歸焉道德感通右六十章以正治國其政悶悶治人事天皆治大國之義小鮮者細小之魚也譬如烹鮮撓之則糜言治平天下撓之則亂也以無爲正其心以清靜養其性卑以自牧則民心悅服天下歸往也往而不害天下和平使剛暴無以施其能鬼不神也至於化暴從善雖有强能而無害物之心聖人亦不加刑於小人上下以德相交故兩不相傷以之修身清淨無爲爲本則情欲絶而陰魔消散形存壽永精復神全此長生乆視之道也頌曰本自見成何須扭捏纔著一毫眼中著屑一句合頭機萬載繫驢橛大國者下流上善若水天下之交衆高附下天下之牝衆剛附柔牝常以靜勝牡靜爲躁君以靜爲下衆動附靜故大國以下小國則取小國以大就小小國以下大國則取大國以小事大或下以取小必歸大或下而取大必納小大國不過欲兼畜人畜凶入聲謙卑接下小國不過欲入事人卑順承上夫兩者上遜下順各得其所欲各當其分故大者宜爲下高以下爲基右六十一章接上章德交之義下流者如水之卑下則衆水歸之柔勝剛靜勝動聖人卑謙自牧安靜應物則天下化成上以下下下下以下順上上遜下順德交歸焉修身以此心愈下而道愈高身愈退而德愈進謙尊而光卑而不可踰故曰大者宜爲下頌曰大不做大小不做小好笑好笑當面諱了等閑伸出無爲手不動干戈定太平道者萬物之奥無所不容善人之寳至尊至貴不善人之所保皆賴道廕美言可以市足以悅衆尊行可以加人行去聲足以出衆人之不善我亦善之何棄之有亦可使之反善故立天子置三公作之君作之師雖有拱璧以先駟馬非寳非貴不如坐進此道道尊德貴古之所以貴此道者善人之寳不日求以得見成有底有罪以免耶不貴於人故爲天下貴善貸且成右六十二章接上章之義奥者大也寳者貴也保者萬物恃之以生也雖下愚不肖者未嘗離也舉動應酬無非此道百姓日用而不知者爲塵識所昧立天子置三公作之君作教師教化下民使不善者從其化拱璧駟見不足爲貴不如坐進此道修己以安百姓先之以敬讓而民不爭陳之以德義而民興行示之以好惡而民知禁是以聖人常善救人故無棄人求則與之有罪宥之不責於人有罪以免故天下尊之也頌曰終日忙忙走回頭便到家悟來無一事不會亂如麻爲無爲藏神於神事無事藏心於心味無味藏形於形大小多少倒行逆施報怨以德不貞於人圖難於其易易去聲下同其脆易破爲大於其細其微易散天下之難事必作於易從微至著天下之大事必作於細積小成大是以聖人終不爲大聖人不自聖故能成其大成聖在民夫輕諾必寡信得之易失之易多易必多難輕易難成是以聖人猶難之不可輕示故終無難得之難失之難右六十三章爲無爲發上章萬物之奥爲無爲無所不爲事無事事事有成味無味其味幽長此三者道之奥也大者小之多者少之怨以德報之圖難於易爲大於細積小成大從微至著聖人功業大成不自爲大天不自天成天者物聖不自聖成聖者民以其不自聖故能成聖爲大必自細升高必自卑難事易成易事難成易事不可輕示輕則人忽之故聖人猶難之得之難失之難凡事不輕易則終無難頌曰說易非容易言難却不難箇中奇特處北斗面南看其安易持易去聲下同居安慮危其未兆易謀作事謀始其脆易破圖難於易其微易散圖大於細爲之於未有防患於未然治之於未亂治之於未有合抱之木生於毫末從微至著九層之臺起於壘土積小成大千里之行始於足下自近至遠爲者敗之貴在謹始執者失之謹則不失是以聖人無爲故無敗無不克無執故無失善抱不脱故民之從事有所施設常於幾成而敗之不謹其始焉得有終愼終如始則無敗事初心不昧焉得有敗是以聖人欲不欲欲人之不欲不貴難得之貨轉物學不學學人之不學復衆人之所過遷善以輔萬物之自然而不敢爲識法者恐右六十四章接上章之義其安易持言作事謀始脩眞志士正心於思慮之先抑情於感物之前則心易正清易絶苟治事於已亂遠禍於已萌不亦難乎積小成大不可救也故易有履霜堅冰之戒傳曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也繫云惡不積不足以滅身又云惡積而不可解可不戒之哉苟有覺於己差之後篤力而反猶可復元終不如未見形迹而解不勞而復故曰其微易散其未兆易謀也又云爲者敗執者失戒之猶切聖人學人之不學欲人之不欲無執無爲終始如一永無危殆若向這裏會得凡事謹始焉有敗失事之未萌悉皆先兆知則不爲爲則不失復初九以之盡此道者其惟顔子乎頌曰差之毫釐失之千里急走回來猶落第二臨厓馬失收韁晚船到江心補漏遲古之善爲士者非以明民不識不知將以愚之其政悶悶民之難治以其智多其政察察以智治國國之賊道之以智其民不足不以智治國國之福道之以德其民有餘此兩者亦楷式楷口駭切寬則得衆盡法無民常知楷式捨短從長是謂玄德合道玄德深矣遠矣愈探愈深愈求愈遠與物反矣不與萬法爲侶然後乃至大順逆行順化右六十五章其安易持反善之速也故次之善爲士者非以明民也言無爲寬大治平天下民之福也有爲嚴謹宰制下民國之賊也民之難治以其多事是以聖人以無爲清靜治國使夫知者不敢爲雖與物反乆慣自然民遂其生獲百倍之慶天下治平成大順之化盡此道者是謂玄德頌曰一切有爲法三千六百門從頭都勘過皆是弄精魂惟吾獨抱無名樸無限群魔倒赤旛江海所以爲百谷王者由其卑下以其善下之大國下流故能爲百谷王異派同歸是以聖人欲上民以言下之謙退欲先民以身後之克己是以聖人處上而民不重民忘其勞處前而民不害民忘其死是以天下樂推而不厭樂音洛以德服人中心服以其不爭謙讓也故天下莫能與之爭天下和平右六十六章善爲士者卑以自牧故次之以江海爲百谷王即上善若水之義以言下民民忘其勞以身後民民忘其死皆道德感通也脩眞志士以卑自牧則身脩頌曰上善若水利物無窮貫金透石隔礙潜通有意留人千里月無心送客一帆風天下皆謂我道大萬物推尊似不肖當面諱了夫惟大無可比擬故似不肖似箇其麽若肖乆矣其細也夫纔可比便不大我有三寳分文不直保而持之珍重珍重一曰慈仁惠二曰儉節約三曰不敢爲天下先謙退夫慈故能勇無不克儉故能廣無不備不敢爲天下先故能成其器長無不服今捨其慈且勇剛暴也捨其儉且廣貪欲也捨其後且先强梁也死矣死之徒夫慈仁以戰則勝仁人之兵不可敵以守則固仁則能守天將救之惟德是輔以慈衛之天地大德曰生聖人守位曰仁右六十七章身愈下而德愈高江海所以能爲百谷王聖人則之故天下皆推尊爲大不肖言無可比也又謙下之辭慈忍謙退儉約卑下故似不肖流俗皆尚廣大强梁血氣之勇也殊不知慈忍謙退極廣大慈之一字戰則勝守則固仁者無敵眞勇也頌曰莫飲無明水休生差别相浮雲散碧空萬里天一樣善爲士者不武慈忍善戰者不怒怒音弩叶武柔和善勝者不爭謙讓善用人者爲下卑遜是謂不爭之德至謙是謂用人之力至柔是謂配天至慈古之極合道右六十八章不武不怒不爭發上章不肖之義不爭之德用人之力皆仁慈之謂故曰配天以此脩身則形存壽永也頌曰不文不武無得無失摸著鼻孔通身汗出分明只在眼睛下擬議之間隔萬山用兵有言吾不敢爲主而爲客慈忍不敢進寸而退尺謙退是謂行無行行下音杭不武攘無臂攘如羊切不怒仍無敵不爭執無兵爲下禍莫大於輕敵勇於敢則殺輕敵幾喪吾寳喪去聲强梁者死之徒故抗兵相加哀者勝仁人之兵天下無敵右六十九章接上章不武之義行無行以下至於哀者勝皆不怒無爭之謂頌曰好勝終須敗唯慈善守成不勞施寸刃天下賀昇平吾言甚易知慈忍而已甚易行儉約而已天下莫能知信不及也莫能行力不及也言有宗開口顯道事有君舉動見道夫惟無知自昧了是以不我知見不明知我者希孰是知音則我者貴孰肯承當是以聖人被褐懷玉内藴道德外行卑下右七十章前章云哀者勝謂仁慈無敵故次之以甚易知甚易行世人莫能知莫能行者信不及也間有信之者又不能行力不及也是以聖人被褐懐玉含華隱耀也頌曰至道不難知人心自執迷疑團百雜碎驀直到曹溪秋月春花無限意箇中只許自家知知不知上眞知不知知病妄知夫惟病病惟恐有知是以不病終無妄知聖人不病知如不知以其病病忘其所知是以不病無所不知右七十一章知不知上接上章吾言甚易知聖人無所不知不自以爲知眞知也世人無所知自以爲知妄知也故曰病若知妄知爲病而病其病則妄知之病瘥矣聖人所以不病者以其病其多知是以不病也頌曰賣弄鬍鬚赤矜誇口鼓禪若能如是會見性待驢年民不畏威無忌憚則大威至自作自受無狹其所居肆情縱意無厭其所生厭平聲貪生無足夫惟不厭錯是以不厭更錯是以聖人反是自知不自見不肆其情自愛不自貴不厚其生故去彼取此去羌吕切右七十二章上章云不知知病不知爲知所以無忌憚也故次之以民不畏威世俗之人不畏大威無狹其居無厭其生尚廣大而厚其生也不知厭足取禍之由故曰大威至矣有道者反是頌曰苦瓠連根苦甜瓜徹蔕甜可憐貪欲者知味不知厭勇於敢則殺强梁者死之徒勇於不敢則活柔弱者生之徒知此兩者或利或害有殺有活天之所惡惡烏路切造物不容孰知其故知則不敢是以聖人猶難之不敢輕示天之道不爭而善勝不與物競物莫能勝不言而善應大音希聲和之則應不召而自來寂然不動感而遂通繟然而善謀繟音闡任運自然無所不克天網恢恢包羅無外䟽而不失雖然䟽闊物莫能逃右七十三章接上章民不畏威言世人不畏公法敢於好勇殺身之本也勇於不敢終身無害勇於敢血氣之勇也勇於不敢義理之勇也頌曰敢勇常輕死頑牛不畏鞭試看狂劣者鼻孔幾番穿民不畏死肆情逐幻奈何以死懼之抱薪救火若使民常畏死而爲奇者以情攝情吾得執而殺之不得放過孰敢誰肯常有司殺者天不容奸夫代司殺者殺不是當行家是謂代大匠斲事不干己夫代大匠斲般門弄斧希有不傷其手矣自取其害右七十四章接上章勇於敢之義民不畏死是上之政化不善民失其業也民失其業欲遂其生故不畏死又加之刑禁使民畏死則是致民於死地也盏法無民天之所惡故聖人亦不容也常有司殺謂天不可欺也代司殺者謂掌刑罰之官也代大匠斲謂不當也希有不傷其手言用刑之極有傷和氣也聖人於此戒省刑罰之切也頌曰虛空無聲墻壁有耳更問如何劈胸便捶大地掀翻行正令倚天長劍逼人寒民之飢荒歉以其上食税之多厚歛則民飢多欲則心荒是以饑常不足民之難治紛亂以其上之有爲事煩則亂是以難治常不定民之輕死忘命以其求生之厚貪欲無厭是以輕死不顧危亡夫惟無以生爲者不厚其生是賢於貴生不自生故長生右七十五章接上章民不畏死之義民之饑民之難治蓋由政教不正民不遂其生是以貪生而不顧危亡也道之以刑則民暴道之以德則民格上好靜則民樂而從其化也頌曰智慧皆爲垢聰明總是塵絲毫不掛念性海自澄澄民之生也柔弱一團和氣其死也堅强和氣散也萬物草木之生也柔脆和氣全其死也枯槁和氣絶故堅强者死之徒剛暴殺身之本柔弱者生之徒柔和養生之要是以兵强則不勝恃强則敗木强則栱栱音拱木剛則折强大處下沈淪之本柔弱處上處上聲上同昇騰之象右七十六章接上章之義上之政化不善有傷和氣故天下多剛暴以無爲清淨修己足以挽回和氣民遂其生樂其業刑不試而萬民悅服何剛暴之有是以修齊治平皆以柔和爲本以丹道言之和氣存則水火交濟和氣散則水火相違故柔弱處上頌曰柔弱未是善剛强未是惡爭如養太和逍遥常快樂天之道其猶張弓乎稱物平施高者抑之低者舉之損上益下有餘者損之不足者與之裒多益寡天之道損有餘而補不足虧盈益謙人之道則不然反是損不足以奉有餘損人益己孰能以有餘奉天下損已益人唯有道者傚天是以聖人爲而不恃損功成不居損其不欲見賢見音現損之又損右七十七章接上章强弱之義損有益無大道也强大者必受損柔弱者必受益惟有道者則天而行損情益性損多益寡損己益人損有餘益不足損之又損以至無爲頌曰益之常不足損則却寬剩只這克己心便是平等秤天下柔弱莫過於水上善若水而攻堅强者莫之能勝棒打不開其無以易之無物可比柔勝剛屈己者勝弱勝强軟能蝕堅天下莫不知衆所共知莫能行擔負不起是以聖人言諦聽受國之垢能爲社稷主海納百川受國之不祥能爲天下王處衆人之所惡正言若反與物相反右七十八章接上章損益之義至卑至弱莫過於水破堤决岸莫之能禦以此可見柔勝剛弱勝强也天下人皆知而不能行何哉不肯卑下故也衆人所惡垢與不祥惟有道者則能受之頌曰弱者從他弱强者任他强休生分别相識取法中王但觀浩淼無窮水幾處隨圓幾處方和大怨必有餘怨施恩成怨安可以爲善錯是以聖人執左契契音挈下同叶徹誠信及物不責於人克己故有德司契性靜情逸無德司徹心動神疲天道無私至公常與聖人惟道是從右七十九章接上章剛柔之義以恩和怨怨雖解而心尚存安可爲善不如責己恩怨兩忘則民心自然感德而契之也大德之人則司契下德之人司徹明徹者通也只知通爲明斷殊不知盡法無民矣安可爲善司契者存誠信與民心契也頌曰明斷傷和氣施恩惹禍殃不如司左契恩怨兩相忘小國寡民不貪使有什伯之器而不用不尚賢使民重死而不遠徙安分雖有舟車無所乘之不動雖有甲兵無所陳之不爭使民復結繩而用之反朴甘其食忘味美其服忘形安其居忘動樂其俗樂音洛忘憂鄰國相望望平聲對境無心鷄犬之聲相聞外境不入内境不出民至老死終身在道不相往來忘其彼此右八十章上章云執左契謂以道感民則自然契合無爭奪也故次之以小國寡民言知足而不貪也國雖小民雖寡自以爲足使有才能者不得見用則民自然無知無欲不遷不變無爭無競安守常分服食興居常樂於道鄰國彼此無犯永無爭奪也頌曰無爲境界能小能大放去收來廓然無礙本來面目現堂堂世界壞時渠不壞信言不美良藥苦口美言不信口頭三昧善者不辯無分别相辯者不善妄生差别知者不博頭頭總是博得不知物物有礙聖人不積不增不减既以爲人己愈有用之不盡既以與人己愈多普濟無窮天之道生生不已利而無害無所不利聖人之道則天而行爲而不爭慈忍儉約右八十一章信言不美忠言逆耳也美言不信巧言令色也眞實之言淡薄虛妄之言華飾善爲道者無分别故不辯善辯者致爭之由故曰不善眞知者光而不耀故曰不博廣博者明見於外故曰不知聖人損其所有愛養萬物不爲主故曰不積養其無象象故常存守其無體體故全眞視之不足見聽之不足聞用之不可既故曰爲人愈有與人愈多天地大德曰生故曰利而無害聖人守位曰仁故曰爲而不爭只這末後一章總發前八十章之藴也經云可道非常道可名非常名不言之教無爲之益希言自然淡乎無味進道若退明道若昧廣德若不足大白若辱曰希曰夷惟恍惟忽大音希聲大器晚成正言若反已上等語雖不美聽其中有信故曰信言不美可道可名可見可聞持而盈之揣而銳之金玉滿堂善之爲善美之爲美樂之與餌聲味俱美已上等語雖美於聽終不實也故曰美言不信若訥若拙若愚若樸若屈若昏不尚己賢不貴奇貨儼兮若客敦兮若樸曠兮若谷渾兮若濁知白守黑知榮守辱不自見不自是不自矜不自伐已上皆不辯之善也尚奇務貨自高自大自見自是自矜自伐勇於敢嗜於欲不畏威不畏死不知足不知止强知前識昭昭察察已上皆不善之辯也不出户知天下不窺牖見天道塞其兊閉其門挫其銳解其紛和其光同其塵不言而信不見而名無爲而成已上皆知者不博之謂也知物知人知事知外無狹其所居無厭其所生開其兊濟其事捨儉且廣捨後且先不知爲知皆是妄知已上皆博者不知之義也爲而不恃長而不宰功成不居絶聖棄智絶仁棄義絶巧棄利少私寡欲見素抱樸損之又損以至無爲去甚去奢去泰無知無事無欲已上皆不積之義也至於曲全枉直窪盈弊新萬物歸之萬民化之天地合之廣施博濟不窮不弊不殆不勤用之不可既此爲人愈有與人愈多之義也天之道生成運化稱物平施生之畜之長之育之成之熟之養之覆之無所不利至公無私惟德是輔不言善應不召自來高者抑之低者舉之有餘者損之不足者與之一切有情無不覆載此利而無害也聖人之道守雌抱一處柔行謙和光同塵後已先人同於道同於德同於失方而不割直而不肆光而不耀不責於人善貸且成善者善之不善者亦善之小國寡民自以爲足使民反樸忘其彼此民至老死不相往來皆不爭之義也只這不爭二字八十章之要也若是信得及底把這不爭二字爲日用乆乆純熟則自然造混元之境眞常之道至是盡矣象帝之先明妙本得矣且道不爭二字作麽會咦放倒門前利竿著頌曰爭之常不是讓之則有餘無爭功不間萬化悉歸渠道德會元卷下
